<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasty Travels: 4 Teams Merge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body { background: #fdfbf7; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; height: 100dvh; padding: 12px 5px; color: #4a3b32; overflow: hidden; }
        header { text-align: center; width: 100%; position: relative; }
        h1 { font-size: 21px; color: #ff6b6b; margin-bottom: 2px; font-weight: 800; text-shadow: 1px 1px 0px #ffe3e3; }
        .version { font-size: 10px; color: #b09e93; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }

        .score-container { display: flex; justify-content: center; gap: 8px; width: 100%; max-width: 420px; margin-bottom: 6px; }
        .score-box { background: #fff; padding: 5px 10px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); font-size: 12px; font-weight: bold; flex: 1; text-align: center; border: 2px solid #fae1dd; }
        .score-box span { display: block; font-size: 15px; color: #ff6b6b; margin-top: 1px; }

        /* 7 x 9 대형 보드판 그리드 */
        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 7 / 9;
            background: #e3d5c8;
            padding: 6px;
            border-radius: 16px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
        }

        .cell {
            background: #fdf0ed;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 0 #d7c4b7;
            border: 2px solid transparent;
            transition: transform 0.1s ease, background-color 0.1s ease;
        }
        .cell:active { transform: translateY(1px); box-shadow: 0 1px 0 #d7c4b7; }
        .cell.selected { background: #ffe3e3 !important; border: 2px solid #ff6b6b; box-shadow: 0 0 6px rgba(255,107,107,0.5); }
        .cell.box-item { background: #fff3cd; border: 2px dashed #ffecb5; }

        .item-icon { font-size: 26px; line-height: 1; pointer-events: none; }

        .controls { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 5px; }
        button { width: 100%; padding: 11px; font-size: 14px; font-weight: bold; border: none; border-radius: 12px; background: #ff6b6b; color: white; cursor: pointer; box-shadow: 0 4px 0 #d94848; transition: all 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d94848; }
        .guide { font-size: 10px; color: #8c7365; text-align: center; }

        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #ff6b6b; margin-bottom: 8px; font-size: 20px; }
        .modal-content p { margin-bottom: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>✈️ Tasty Travels</h1>
        <div class="version">v1.1.1 (Team Boxes)</div>
        <div class="score-container">
            <div class="score-box">점수 <span id="score">0</span></div>
            <div class="score-box">최고 기록 <span id="best-score">0</span></div>
        </div>
    </header>

    <div class="board" id="board"></div>

    <div class="controls">
        <button onclick="spawnRandomBox()">팀별 꾸러미 상자 소환 📦</button>
        <p class="guide">팀별 상자(🧺, ☕, 🍪, 🎁)를 열어 하위 아이템을 획득하세요!</p>
    </div>

    <div id="game-over">
        <div class="modal-content">
            <h2>Game Over! 😢</h2>
            <p>보드판에 빈자리가 없습니다!<br>최종 점수: <span id="final-score" style="font-weight:bold; color:#ff6b6b;">0</span>점</p>
            <button onclick="resetGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 🍎 4가지 팀 정의 및 팀별 상자 아이콘 지정
        const teamsConfig = {
            fruit: { name: '과일', boxIcon: '🧺' },
            coffee: { name: '커피', boxIcon: '☕' },
            cookie: { name: '과자', boxIcon: '🍪' },
            toy: { name: '장난감', boxIcon: '🎁' }
        };

        const itemRegistry = [
            // 과일 팀
            { team: 'fruit', tier: 1, icon: '🍑' },
            { team: 'fruit', tier: 2, icon: '🍎' },
            { team: 'fruit', tier: 3, icon: '🍓' },
            { team: 'fruit', tier: 4, icon: '🍌' },
            { team: 'fruit', tier: 5, icon: '🍉' },
            // 커피 팀
            { team: 'coffee', tier: 1, icon: '🫘' },
            { team: 'coffee', tier: 2, icon: '☕' },
            { team: 'coffee', tier: 3, icon: '🧋' },
            { team: 'coffee', tier: 4, icon: '🧊' },
            { team: 'coffee', tier: 5, icon: '🏆' },
            // 과자 팀
            { team: 'cookie', tier: 1, icon: '🌾' },
            { team: 'cookie', tier: 2, icon: '🍪' },
            { team: 'cookie', tier: 3, icon: '🍰' },
            { team: 'cookie', tier: 4, icon: '🧁' },
            { team: 'cookie', tier: 5, icon: '🏰' },
            // 장난감 팀
            { team: 'toy', tier: 1, icon: '🧩' },
            { team: 'toy', tier: 2, icon: '🧸' },
            { team: 'toy', tier: 3, icon: '🤖' },
            { team: 'toy', tier: 4, icon: '🛸' },
            { team: 'toy', tier: 5, icon: '👑' }
        ];

        const TOTAL_CELLS = 7 * 9;
        let board = Array(TOTAL_CELLS).fill(null);
        let score = 0;
        let bestScore = localStorage.getItem('tasty_best_v6') || 0;
        let selectedIdx = null;

        document.getElementById('best-score').innerText = bestScore;

        function updateView() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            board.forEach((cellData, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selectedIdx === idx) cell.classList.add('selected');

                if (cellData && cellData.isBox) {
                    // 팀별 상자 표시 (과일바구니, 커피머신, 과자박스, 장난감박스)
                    cell.classList.add('box-item');
                    cell.innerHTML = `<div class="item-icon">${cellData.boxIcon}</div>`;
                } else if (cellData !== null) {
                    cell.innerHTML = `<div class="item-icon">${cellData.icon}</div>`;
                }

                cell.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleCellClick(idx);
                });

                boardEl.appendChild(cell);
            });

            document.getElementById('score').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tasty_best_v6', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
        }

        function handleCellClick(idx) {
            let cellData = board[idx];

            // 상자일 경우 해당 팀의 상자 열기 실행
            if (cellData && cellData.isBox) {
                openBox(idx, cellData.team);
                return;
            }

            if (selectedIdx === null) {
                if (cellData !== null) {
                    selectedIdx = idx;
                    updateView();
                }
            } else {
                let firstData = board[selectedIdx];
                if (selectedIdx === idx) {
                    selectedIdx = null;
                } else if (firstData && cellData &&
                           !firstData.isBox && !cellData.isBox &&
                           firstData.team === cellData.team &&
                           firstData.tier === cellData.tier) {

                    let nextTier = firstData.tier + 1;
                    let nextItem = itemRegistry.find(i => i.team === firstData.team && i.tier === nextTier);

                    if (nextItem) {
                        board[idx] = { ...nextItem, isBox: false };
                        score += board[idx].tier * 50;
                    } else {
                        score += 500;
                        board[idx] = { ...firstData };
                    }

                    board[selectedIdx] = null;
                    selectedIdx = null;
                    updateView();
                } else {
                    selectedIdx = (cellData !== null && !cellData.isBox) ? idx : null;
                }
                updateView();
            }
        }

        // 📦 팀별 상자 오픈 함수 (대부분 1단계, 아주 가끔 2단계 드랍)
        function openBox(boxIdx, teamName) {
            board[boxIdx] = null;
            let emptyIdxs = board.map((val, i) => val === null ? i : null).filter(v => v !== null);

            let dropCount = Math.min(emptyIdxs.length, Math.floor(Math.random() * 3) + 3); // 3~5개 드랍
            for (let i = 0; i < dropCount; i++) {
                if (emptyIdxs.length === 0) break;
                let randPosIdx = Math.floor(Math.random() * emptyIdxs.length);
                let targetCell = emptyIdxs.splice(randPosIdx, 1)[0];

                // 💡 요청사항: 첫단계(1티어)가 거의 나오다가, 어쩌다 한번씩(15폭 확률) 2단계 나오기
                let spawnedTier = Math.random() < 0.85 ? 1 : 2;

                let spawned = itemRegistry.find(i => i.team === teamName && i.tier === spawnedTier);
                board[targetCell] = { ...spawned, isBox: false };
            }

            score += 80;
            selectedIdx = null;
            updateView();
            checkGameOver();
        }

        function spawnRandomBox() {
            let emptyIdxs = board.map((val, i) => val === null ? i : null).filter(v => v !== null);
            if (emptyIdxs.length === 0) {
                checkGameOver();
                return;
            }
            let target = emptyIdxs[Math.floor(Math.random() * emptyIdxs.length)];

            // 무작위 팀 선택하여 해당 팀의 상자 생성
            let keys = Object.keys(teamsConfig);
            let chosenTeamKey = keys[Math.floor(Math.random() * keys.length)];

            board[target] = {
                isBox: true,
                team: chosenTeamKey,
                boxIcon: teamsConfig[chosenTeamKey].boxIcon
            };
            updateView();
        }

        document.getElementById('board').addEventListener('click', (e) => {
            const cellEl = e.target.closest('.cell');
            if (!cellEl) return;
            const cells = Array.from(document.getElementById('board').children);
            const idx = cells.indexOf(cellEl);
            if (idx !== -1) {
                if (!('ontouchstart' in window)) {
                    handleCellClick(idx);
                }
            }
        });

        function checkGameOver() {
            const emptyCount = board.filter(v => v === null).length;
            if (emptyCount === 0) {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        function resetGame() {
            board = Array(TOTAL_CELLS).fill(null);
            score = 0;
            selectedIdx = null;
            document.getElementById('game-over').style.display = 'none';
            initGame();
        }

        function initGame() {
            let teamKeys = Object.keys(teamsConfig);
            for (let i = 0; i < TOTAL_CELLS; i++) {
                let r = Math.random();
                if (r < 0.55) {
                    let chosenTeam = teamKeys[Math.floor(Math.random() * teamKeys.length)];
                    let chosenTier = Math.random() < 0.85 ? 1 : 2;
                    let spawned = itemRegistry.find(item => item.team === chosenTeam && item.tier === chosenTier);
                    board[i] = { ...spawned, isBox: false };
                } else if (r < 0.65) {
                    let chosenTeam = teamKeys[Math.floor(Math.random() * teamKeys.length)];
                    board[i] = {
                        isBox: true,
                        team: chosenTeam,
                        boxIcon: teamsConfig[chosenTeam].boxIcon
                    };
                } else {
                    board[i] = null;
                }
            }
            updateView();
        }

        initGame();
    </script>
</body>
</html>
