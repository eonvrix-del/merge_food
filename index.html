<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasty Travels: 4 Teams Merge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body { background: #fdfbf7; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; height: 100dvh; padding: 12px 5px; color: #4a3b32; overflow: hidden; }
        header { text-align: center; width: 100%; position: relative; }
        h1 { font-size: 21px; color: #ff6b6b; margin-bottom: 2px; font-weight: 800; text-shadow: 1px 1px 0px #ffe3e3; }
        .version { font-size: 10px; color: #b09e93; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }

        .score-container { display: flex; justify-content: center; gap: 8px; width: 100%; max-width: 420px; margin-bottom: 6px; }
        .score-box { background: #fff; padding: 5px 10px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); font-size: 12px; font-weight: bold; flex: 1; text-align: center; border: 2px solid #fae1dd; }
        .score-box span { display: block; font-size: 15px; color: #ff6b6b; margin-top: 1px; }

        /* 7 x 9 대형 보드판 그리드 */
        .board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 7 / 9;
            background: #e3d5c8;
            padding: 6px;
            border-radius: 16px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
        }

        .cell {
            background: #fdf0ed;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 0 #d7c4b7;
            border: 2px solid transparent;
            transition: transform 0.1s ease, background-color 0.1s ease;
            touch-action: none;
        }
        .cell:active { transform: translateY(1px); box-shadow: 0 1px 0 #d7c4b7; }
        .cell.selected { background: #ffe3e3 !important; border: 2px solid #ff6b6b; box-shadow: 0 0 6px rgba(255,107,107,0.5); }
        .cell.box-item { flex-direction: column; gap: 1px; background: #fff3cd; border: 2px dashed #ffecb5; }
        .cell.box-item.box-fruit { background: #ffe8e0; border-color: #ff9d76; }
        .cell.box-item.box-coffee { background: #ecdfd2; border-color: #8a5a3b; }
        .cell.box-item.box-cookie { background: #fff0cf; border-color: #e0a83e; }
        .cell.box-item.box-toy { background: #e2f0ff; border-color: #5b9bd5; }
        .cell.box-item.empty { opacity: 0.55; }

        .item-icon { font-size: 26px; line-height: 1; pointer-events: none; }
        .box-item .item-icon { font-size: 20px; pointer-events: none; }
        .box-label { font-size: 6.5px; font-weight: bold; line-height: 1.1; color: #6b5642; pointer-events: none; white-space: nowrap; }
        .box-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ff6b6b;
            color: #fff;
            font-size: 8px;
            font-weight: 800;
            border-radius: 7px;
            padding: 0 3px;
            line-height: 1.4;
            pointer-events: none;
        }
        .cell.box-item.empty .box-count { background: #9a9a9a; }

        .controls { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 5px; }
        button { width: 100%; padding: 11px; font-size: 14px; font-weight: bold; border: none; border-radius: 12px; background: #ff6b6b; color: white; cursor: pointer; box-shadow: 0 4px 0 #d94848; transition: all 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d94848; }
        .guide { font-size: 10px; color: #8c7365; text-align: center; }

        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #ff6b6b; margin-bottom: 8px; font-size: 20px; }
        .modal-content p { margin-bottom: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>✈️ Tasty Travels</h1>
        <div class="version">v1.2.0 (Box Dispenser)</div>
        <div class="score-container">
            <div class="score-box">점수 <span id="score">0</span></div>
            <div class="score-box">최고 기록 <span id="best-score">0</span></div>
        </div>
    </header>

    <div class="board" id="board"></div>

    <div class="controls">
        <p class="guide">과일 박스🧺·커피 박스⚙️·과자 박스📦·장난감 박스🎁를 톡 터치하면 아이템이 1개 나와요! 상자는 10개까지 채워지고, 다 쓰면 시간이 지나며 다시 채워집니다. 상자를 꾹 눌러 드래그하면 다른 칸과 위치를 바꿀 수 있어요.</p>
    </div>

    <div id="game-over">
        <div class="modal-content">
            <h2>Game Over! 😢</h2>
            <p>보드판에 빈자리가 없습니다!<br>최종 점수: <span id="final-score" style="font-weight:bold; color:#ff6b6b;">0</span>점</p>
            <button onclick="resetGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // iOS Safari 전용 핀치 확대 제스처 차단 (touch-action만으로는 일부 기기에서 새지 않음)
        ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(evt) {
            document.addEventListener(evt, function(e) {
                e.preventDefault();
            }, { passive: false });
        });

        // 🍎 4가지 팀 정의 및 팀별 상자 아이콘 지정
        const teamsConfig = {
            fruit: { name: '과일', boxIcon: '🧺', boxLabel: '과일 박스' },
            coffee: { name: '커피', boxIcon: '⚙️', boxLabel: '커피 박스' },
            cookie: { name: '과자', boxIcon: '📦', boxLabel: '과자 박스' },
            toy: { name: '장난감', boxIcon: '🎁', boxLabel: '장난감 박스' }
        };

        const itemRegistry = [
            // 과일 팀
            { team: 'fruit', tier: 1, icon: '🍑' },
            { team: 'fruit', tier: 2, icon: '🍎' },
            { team: 'fruit', tier: 3, icon: '🍓' },
            { team: 'fruit', tier: 4, icon: '🍌' },
            { team: 'fruit', tier: 5, icon: '🍉' },
            // 커피 팀
            { team: 'coffee', tier: 1, icon: '🫘' },
            { team: 'coffee', tier: 2, icon: '☕' },
            { team: 'coffee', tier: 3, icon: '🧋' },
            { team: 'coffee', tier: 4, icon: '🧊' },
            { team: 'coffee', tier: 5, icon: '🏆' },
            // 과자 팀
            { team: 'cookie', tier: 1, icon: '🌾' },
            { team: 'cookie', tier: 2, icon: '🍪' },
            { team: 'cookie', tier: 3, icon: '🍰' },
            { team: 'cookie', tier: 4, icon: '🧁' },
            { team: 'cookie', tier: 5, icon: '🏰' },
            // 장난감 팀
            { team: 'toy', tier: 1, icon: '🧩' },
            { team: 'toy', tier: 2, icon: '🧸' },
            { team: 'toy', tier: 3, icon: '🤖' },
            { team: 'toy', tier: 4, icon: '🛸' },
            { team: 'toy', tier: 5, icon: '👑' }
        ];

        const TOTAL_CELLS = 7 * 9;
        const BOX_MAX_CHARGES = 10;
        const REGEN_INTERVAL_MS = 8000; // 8초마다 1개씩 자동 충전
        const DRAG_THRESHOLD = 12; // 이 이상 움직이면 탭이 아니라 드래그로 판정

        let board = Array(TOTAL_CELLS).fill(null);
        let score = 0;
        let bestScore = localStorage.getItem('tasty_best_v7') || 0;
        let selectedIdx = null;
        let dragState = null; // { idx, x, y }

        document.getElementById('best-score').innerText = bestScore;

        function updateView() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            board.forEach((cellData, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selectedIdx === idx) cell.classList.add('selected');

                if (cellData && cellData.isBox) {
                    // 팀별 상자 표시 (과일상자, 커피머신, 과자상자, 장난감상자)
                    cell.classList.add('box-item', `box-${cellData.team}`);
                    if (cellData.charges <= 0) cell.classList.add('empty');
                    cell.innerHTML = `
                        <div class="item-icon">${cellData.boxIcon}</div>
                        <div class="box-label">${cellData.boxLabel}</div>
                        <div class="box-count">${cellData.charges}/${cellData.maxCharges}</div>
                    `;
                } else if (cellData !== null) {
                    cell.innerHTML = `<div class="item-icon">${cellData.icon}</div>`;
                }

                cell.addEventListener('pointerdown', (e) => {
                    dragState = { idx, x: e.clientX, y: e.clientY };
                });

                boardEl.appendChild(cell);
            });

            document.getElementById('score').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tasty_best_v7', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
        }

        // 탭(짧게 터치)과 드래그(이동 후 놓기)를 구분해서 처리
        document.addEventListener('pointerup', (e) => {
            if (!dragState) return;
            const { idx: fromIdx, x: startX, y: startY } = dragState;
            dragState = null;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < DRAG_THRESHOLD) {
                handleCellClick(fromIdx);
                return;
            }

            const el = document.elementFromPoint(e.clientX, e.clientY);
            const cellEl = el ? el.closest('.cell') : null;
            if (!cellEl) return;
            const cells = Array.from(document.getElementById('board').children);
            const toIdx = cells.indexOf(cellEl);
            if (toIdx === -1 || toIdx === fromIdx) return;

            handleDragSwap(fromIdx, toIdx);
        });

        // 상자(또는 상자와 인접한 칸)를 드래그하면 서로 자리를 맞바꿈 (합치기 아님)
        function handleDragSwap(fromIdx, toIdx) {
            const fromCell = board[fromIdx];
            const toCell = board[toIdx];
            if (!(fromCell && fromCell.isBox) && !(toCell && toCell.isBox)) return;

            board[fromIdx] = toCell;
            board[toIdx] = fromCell;
            selectedIdx = null;
            updateView();
        }

        function handleCellClick(idx) {
            let cellData = board[idx];

            // 상자일 경우 터치할 때마다 아이템 1개 배출
            if (cellData && cellData.isBox) {
                dispenseFromBox(idx);
                return;
            }

            if (selectedIdx === null) {
                if (cellData !== null) {
                    selectedIdx = idx;
                    updateView();
                }
            } else {
                let firstData = board[selectedIdx];
                if (selectedIdx === idx) {
                    selectedIdx = null;
                } else if (firstData && cellData &&
                           !firstData.isBox && !cellData.isBox &&
                           firstData.team === cellData.team &&
                           firstData.tier === cellData.tier) {

                    let nextTier = firstData.tier + 1;
                    let nextItem = itemRegistry.find(i => i.team === firstData.team && i.tier === nextTier);

                    if (nextItem) {
                        board[idx] = { ...nextItem, isBox: false };
                        score += board[idx].tier * 50;
                    } else {
                        score += 500;
                        board[idx] = { ...firstData };
                    }

                    board[selectedIdx] = null;
                    selectedIdx = null;
                    updateView();
                } else {
                    selectedIdx = (cellData !== null && !cellData.isBox) ? idx : null;
                }
                updateView();
            }
        }

        // 📦 상자를 터치할 때마다 아이템 1개씩 배출 (대부분 1단계, 가끔 2단계)
        function dispenseFromBox(boxIdx) {
            const box = board[boxIdx];
            if (!box || box.charges <= 0) return;

            let emptyIdxs = board.map((val, i) => val === null ? i : null).filter(v => v !== null);
            if (emptyIdxs.length === 0) {
                checkGameOver();
                return;
            }
            let target = emptyIdxs[Math.floor(Math.random() * emptyIdxs.length)];
            let spawnedTier = Math.random() < 0.85 ? 1 : 2;
            let spawned = itemRegistry.find(i => i.team === box.team && i.tier === spawnedTier);
            board[target] = { ...spawned, isBox: false };

            box.charges -= 1;
            if (box.charges <= 0) {
                box.charges = 0;
                box.nextRegenAt = Date.now() + REGEN_INTERVAL_MS;
            }

            score += 10;
            selectedIdx = null;
            updateView();
            checkGameOver();
        }

        // 상자 충전: 최대치 미만이면 일정 시간마다 1개씩 자동으로 채움
        function regenTick() {
            const now = Date.now();
            let changed = false;
            board.forEach(cell => {
                if (cell && cell.isBox && cell.charges < cell.maxCharges) {
                    if (!cell.nextRegenAt) cell.nextRegenAt = now + REGEN_INTERVAL_MS;
                    if (now >= cell.nextRegenAt) {
                        cell.charges = Math.min(cell.maxCharges, cell.charges + 1);
                        cell.nextRegenAt = cell.charges < cell.maxCharges ? now + REGEN_INTERVAL_MS : null;
                        changed = true;
                    }
                }
            });
            if (changed) updateView();
        }
        setInterval(regenTick, 1000);

        function checkGameOver() {
            const emptyCount = board.filter(v => v === null).length;
            if (emptyCount === 0) {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        function resetGame() {
            board = Array(TOTAL_CELLS).fill(null);
            score = 0;
            selectedIdx = null;
            document.getElementById('game-over').style.display = 'none';
            initGame();
        }

        function initGame() {
            board = Array(TOTAL_CELLS).fill(null);
            const teamKeys = Object.keys(teamsConfig);

            // 1. 초기 아이템을 무작위로 배치 (일부는 빈 칸으로 남김)
            for (let i = 0; i < TOTAL_CELLS; i++) {
                if (Math.random() < 0.45) {
                    let chosenTeam = teamKeys[Math.floor(Math.random() * teamKeys.length)];
                    let chosenTier = Math.random() < 0.85 ? 1 : 2;
                    let spawned = itemRegistry.find(item => item.team === chosenTeam && item.tier === chosenTier);
                    board[i] = { ...spawned, isBox: false };
                }
            }

            // 2. 게임마다 팀별 상자를 종류별로 1개씩, 빈 칸 중 무작위 위치에 배치
            let emptyIdxs = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            teamKeys.forEach(team => {
                if (emptyIdxs.length === 0) return;
                let randPos = Math.floor(Math.random() * emptyIdxs.length);
                let cellIdx = emptyIdxs.splice(randPos, 1)[0];
                board[cellIdx] = {
                    isBox: true,
                    team,
                    boxIcon: teamsConfig[team].boxIcon,
                    boxLabel: teamsConfig[team].boxLabel,
                    charges: BOX_MAX_CHARGES,
                    maxCharges: BOX_MAX_CHARGES,
                    nextRegenAt: null
                };
            });

            updateView();
        }

        initGame();
    </script>
</body>
</html>
