<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasty Travels: Mystery Box</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        body { background: #fff8f0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; height: 100dvh; padding: 15px 5px; color: #4a3b32; overflow: hidden; }
        header { text-align: center; width: 100%; position: relative; }
        h1 { font-size: 22px; color: #ff6b6b; margin-bottom: 2px; font-weight: 800; text-shadow: 1px 1px 0px #ffe3e3; }
        .version { font-size: 10px; color: #b09e93; font-weight: bold; margin-bottom: 6px; letter-spacing: 1px; }
        
        .score-container { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 420px; margin-bottom: 8px; }
        .score-box { background: #fff; padding: 6px 12px; border-radius: 14px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); font-size: 13px; font-weight: bold; flex: 1; text-align: center; border: 2px solid #fae1dd; }
        .score-box span { display: block; font-size: 16px; color: #ff6b6b; margin-top: 2px; }
        
        /* 7 x 9 대형 보드판 그리드 */
        .board { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; 
            width: 100%; 
            max-width: 420px; 
            aspect-ratio: 7 / 9; 
            background: #e3d5c8; 
            padding: 8px; 
            border-radius: 16px; 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.08); 
        }
        
        .cell { 
            background: #fdf0ed; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            box-shadow: 0 2px 0 #d7c4b7; 
            border: 2px solid transparent; 
            transition: transform 0.1s ease, background-color 0.1s ease; 
        }
        .cell:active { transform: translateY(1px); box-shadow: 0 1px 0 #d7c4b7; }
        .cell.selected { background: #ffe3e3 !important; border: 2px solid #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.5); }
        
        /* 미스터리 상자 스타일 특별 강조 */
        .cell.box-item { background: #fff3cd; border: 2px dashed #ffecb5; }

        .item-icon { font-size: 20px; line-height: 1; margin-bottom: 2px; pointer-events: none; }
        .item-name { font-size: 7px; font-weight: bold; color: #7a6558; background: rgba(255,255,255,0.7); padding: 1px 4px; border-radius: 4px; pointer-events: none; }

        .controls { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 6px; }
        button { width: 100%; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 14px; background: #ff6b6b; color: white; cursor: pointer; box-shadow: 0 4px 0 #d94848; transition: all 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #d94848; }
        .guide { font-size: 11px; color: #8c7365; text-align: center; margin-top: 2px; }

        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #ff6b6b; margin-bottom: 8px; font-size: 20px; }
        .modal-content p { margin-bottom: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>✈️ Tasty Travels</h1>
        <div class="version">v1.0.7 (7x9 Mystery Box)</div>
        <div class="score-container">
            <div class="score-box">점수 <span id="score">0</span></div>
            <div class="score-box">최고 기록 <span id="best-score">0</span></div>
        </div>
    </header>

    <div class="board" id="board"></div>

    <div class="controls">
        <button onclick="spawnMysteryBox()">미스터리 상자 소환 📦</button>
        <p class="guide">📦 상자를 터치하면 주변에 하위 아이템들이 랜덤으로 쏟아져요!</p>
    </div>

    <div id="game-over">
        <div class="modal-content">
            <h2>Game Over! 😢</h2>
            <p>보드판에 빈자리가 없습니다!<br>최종 점수: <span id="final-score" style="font-weight:bold; color:#ff6b6b;">0</span>점</p>
            <button onclick="resetGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        const stages = [
            { icon: '💧', name: '맑은 물' },      // val = 1
            { icon: '🌾', name: '황금 밀' },      // val = 2
            { icon: '🍞', name: '고소한 빵' },    // val = 3
            { icon: '🧀', name: '신선 치즈' },    // val = 4
            { icon: '🍳', name: '달걀후라이' },  // val = 5
            { icon: '🍔', name: '수제 햄버거' },  // val = 6
            { icon: '🍕', name: '화덕 피자' },    // val = 7
            { icon: '🥞', name: '팬케이크' },    // val = 8
            { icon: '🍰', name: '딸기 케이크' },  // val = 9
            { icon: '👑', name: '미슐랭 요리' }   // val = 10
        ];

        const TOTAL_CELLS = 7 * 9; // 63칸
        let board = Array(TOTAL_CELLS).fill(0);
        let score = 0;
        let bestScore = localStorage.getItem('tasty_best_v2') || 0;
        let selectedIdx = null;

        document.getElementById('best-score').innerText = bestScore;

        function updateView() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            board.forEach((val, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selectedIdx === idx) cell.classList.add('selected');

                if (val === 99) {
                    // 미스터리 상자 아이템
                    cell.classList.add('box-item');
                    cell.innerHTML = `
                        <div class="item-icon">📦</div>
                        <div class="item-name">상자</div>
                    `;
                } else if (val > 0) {
                    const item = stages[val - 1];
                    cell.innerHTML = `
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-name">${item.name}</div>
                    `;
                }
                
                cell.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleCellClick(idx);
                });

                boardEl.appendChild(cell);
            });

            document.getElementById('score').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tasty_best_v2', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
        }

        function handleCellClick(idx) {
            // 만약 누른 곳이 '미스터리 상자(99)'라면 상자를 까서 하위 아이템들을 랜덤 소환!
            if (board[idx] === 99) {
                openBox(idx);
                return;
            }

            if (selectedIdx === null) {
                if (board[idx] > 0 && board[idx] !== 99) {
                    selectedIdx = idx;
                    updateView();
                }
            } else {
                if (selectedIdx === idx) {
                    selectedIdx = null;
                } else if (board[selectedIdx] === board[idx]) {
                    let currentVal = board[idx];
                    let nextVal = currentVal + 1;
                    if (Math.random() < 0.15 && currentVal < stages.length - 1) {
                        nextVal = currentVal + 2; // 대박 진화
                    }
                    
                    board[idx] = Math.min(nextVal, stages.length);
                    score += board[idx] * 30;
                    board[selectedIdx] = 0;
                    selectedIdx = null;
                    
                    updateView();
                } else {
                    selectedIdx = (board[idx] > 0 && board[idx] !== 99) ? idx : null;
                }
                updateView();
            }
        }

        // 📦 미스터리 상자를 열었을 때 동작하는 함수
        function openBox(boxIdx) {
            board[boxIdx] = 0; // 상자 소모
            
            // 주변 빈칸들 찾기 (상하좌우 또는 전체 빈칸 중 몇 개 선택)
            let emptyIdxs = board.map((val, i) => val === 0 ? i : null).filter(v => v !== null);
            
            // 랜덤으로 2~4개의 하위 아이템을 빈칸에 펑펑 뱉어냄
            let dropCount = Math.min(emptyIdxs.length, Math.floor(Math.random() * 3) + 2);
            for (let i = 0; i < dropCount; i++) {
                if (emptyIdxs.length === 0) break;
                let randPosIdx = Math.floor(Math.random() * emptyIdxs.length);
                let targetCell = emptyIdxs.splice(randPosIdx, 1)[0];
                
                // 하위 아이템 랜덤 결정 (1~3단계 중 확률적 등장)
                let r = Math.random();
                let spawnedVal = r < 0.6 ? 1 : (r < 0.9 ? 2 : 3);
                board[targetCell] = spawnedVal;
            }
            
            score += 50; // 상자 연 보상 점수
            selectedIdx = null;
            updateView();
            checkGameOver();
        }

        // 버튼으로 미스터리 상자를 직접 소환하거나 빈곳에 채우기
        function spawnMysteryBox() {
            let emptyIdxs = board.map((val, i) => val === 0 ? i : null).filter(v => v !== null);
            if (emptyIdxs.length === 0) {
                checkGameOver();
                return;
            }
            let target = emptyIdxs[Math.floor(Math.random() * emptyIdxs.length)];
            board[target] = 99; // 99는 상자 아이디
            updateView();
        }

        document.getElementById('board').addEventListener('click', (e) => {
            const cellEl = e.target.closest('.cell');
            if (!cellEl) return;
            const cells = Array.from(document.getElementById('board').children);
            const idx = cells.indexOf(cellEl);
            if (idx !== -1) {
                if (!('ontouchstart' in window)) {
                    handleCellClick(idx);
                }
            }
        });

        function checkGameOver() {
            const emptyCount = board.filter(v => v === 0).length;
            if (emptyCount === 0) {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        function resetGame() {
            board = Array(TOTAL_CELLS).fill(0);
            score = 0;
            selectedIdx = null;
            document.getElementById('game-over').style.display = 'none';
            initGame();
        }

        function initGame() {
            // 처음에 일부 칸만 비워두고(약 70% 채우기), 일반 재료 및 상자 배치
            for (let i = 0; i < TOTAL_CELLS; i++) {
                let r = Math.random();
                if (r < 0.55) {
                    board[i] = Math.random() < 0.7 ? 1 : 2; // 일반 재료
                } else if (r < 0.65) {
                    board[i] = 99; // 미스터리 상자 배치
                } else {
                    board[i] = 0; // 비어있는 칸
                }
            }
            updateView();
        }

        initGame();
    </script>
</body>
</html>
