<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tasty Travels: Merge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: #fff8f0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; height: 100dvh; padding: 20px 10px; color: #4a3b32; user-select: none; }
        header { text-align: center; width: 100%; position: relative; }
        h1 { font-size: 24px; color: #ff6b6b; margin-bottom: 4px; font-weight: 800; text-shadow: 1px 1px 0px #ffe3e3; }
        .version { font-size: 11px; color: #b09e93; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
        
        .score-container { display: flex; justify-content: center; gap: 15px; width: 100%; max-width: 380px; margin-bottom: 10px; }
        .score-box { background: #fff; padding: 8px 16px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 14px; font-weight: bold; flex: 1; text-align: center; border: 2px solid #fae1dd; }
        .score-box span { display: block; font-size: 18px; color: #ff6b6b; margin-top: 2px; }
        
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 380px; aspect-ratio: 1; background: #e3d5c8; padding: 12px; border-radius: 20px; box-shadow: inset 0 4px 8px rgba(0,0,0,0.08); }
        .cell { background: #fdf0ed; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; box-shadow: 0 4px 0 #d7c4b7; transition: all 0.1s ease; }
        .cell:active { transform: translateY(2px); box-shadow: 0 2px 0 #d7c4b7; }
        .cell.selected { background: #ffe3e3 !important; border: 3px solid #ff6b6b; box-shadow: 0 0 10px rgba(255,107,107,0.5); }
        
        .item-icon { font-size: 32px; line-height: 1; margin-bottom: 4px; }
        .item-name { font-size: 10px; font-weight: bold; color: #7a6558; background: rgba(255,255,255,0.7); padding: 1px 6px; border-radius: 6px; }

        .controls { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 16px; background: #ff6b6b; color: white; cursor: pointer; box-shadow: 0 5px 0 #d94848; transition: all 0.1s; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #d94848; }
        .guide { font-size: 12px; color: #8c7365; text-align: center; margin-top: 4px; }

        /* 게임오버 모달 */
        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .modal-content { background: #fff; padding: 30px; border-radius: 24px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content h2 { color: #ff6b6b; margin-bottom: 10px; font-size: 22px; }
        .modal-content p { margin-bottom: 20px; font-size: 15px; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>✈️ Tasty Travels</h1>
        <div class="version">v1.0.3</div>
        <div class="score-container">
            <div class="score-box">점수 <span id="score">0</span></div>
            <div class="score-box">최고 기록 <span id="best-score">0</span></div>
        </div>
    </header>

    <div class="board" id="board"></div>

    <div class="controls">
        <button onclick="refreshBoardItems()">재료 새로고침 🔄</button>
        <p class="guide">같은 요리를 터치해 합치면 새로운 재료가 자동 리필돼요!</p>
    </div>

    <div id="game-over">
        <div class="modal-content">
            <h2>Game Over! 😢</h2>
            <p>더 이상 합칠 수 없습니다!<br>최종 점수: <span id="final-score" style="font-weight:bold; color:#ff6b6b;">0</span>점</p>
            <button onclick="resetGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        const stages = [
            { icon: '💧', name: '맑은 물' },
            { icon: '🌾', name: '황금 밀' },
            { icon: '🍞', name: '고소한 빵' },
            { icon: '🧀', name: '신선 치즈' },
            { icon: '🍳', name: '달걀후라이' },
            { icon: '🍔', name: '수제 햄버거' },
            { icon: '🍕', name: '화덕 피자' },
            { icon: '🥞', name: '팬케이크' },
            { icon: '🍰', name: '딸기 케이크' },
            { icon: '👑', name: '미슐랭 요리' }
        ];

        let board = Array(16).fill(0);
        let score = 0;
        let bestScore = localStorage.getItem('tasty_best') || 0;
        let selectedIdx = null;

        document.getElementById('best-score').innerText = bestScore;

        function updateView() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            board.forEach((val, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (selectedIdx === idx) cell.classList.add('selected');

                if (val > 0) {
                    const item = stages[val - 1];
                    cell.innerHTML = `
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-name">${item.name}</div>
                    `;
                }
                
                cell.onclick = () => handleCellClick(idx);
                boardEl.appendChild(cell);
            });

            document.getElementById('score').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tasty_best', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
        }

        function fillEmptyCells() {
            let added = false;
            for (let i = 0; i < board.length; i++) {
                if (board[i] === 0) {
                    board[i] = 1;
                    added = true;
                }
            }
            if (added) updateView();
            checkGameOver();
        }

        function refreshBoardItems() {
            for (let i = 0; i < board.length; i++) {
                board[i] = Math.floor(Math.random() * 3) + 1;
            }
            selectedIdx = null;
            updateView();
        }

        function handleCellClick(idx) {
            if (selectedIdx === null) {
                if (board[idx] > 0) {
                    selectedIdx = idx;
                    updateView();
                }
            } else {
                if (selectedIdx === idx) {
                    selectedIdx = null;
                } else if (board[selectedIdx] === board[idx]) {
                    board[idx] = Math.min(board[idx] + 1, stages.length);
                    score += board[idx] * 20;
                    board[selectedIdx] = 0;
                    selectedIdx = null;
                    
                    updateView();
                    setTimeout(fillEmptyCells, 200);
                } else {
                    selectedIdx = board[idx] > 0 ? idx : null;
                }
                updateView();
            }
        }

        function checkGameOver() {
            const emptyCount = board.filter(v => v === 0).length;
            if (emptyCount === 0) {
                let canMerge = false;
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        let i = r * 4 + c;
                        if (c < 3 && board[i] === board[i + 1]) canMerge = true;
                        if (r < 3 && board[i] === board[i + 4]) canMerge = true;
                    }
                }
                if (!canMerge) {
                    document.getElementById('final-score').innerText = score;
                    document.getElementById('game-over').style.display = 'flex';
                }
            }
        }

        function resetGame() {
            board = Array(16).fill(0);
            score = 0;
            selectedIdx = null;
            document.getElementById('game-over').style.display = 'none';
            for (let i = 0; i < board.length; i++) {
                board[i] = Math.random() < 0.7 ? 1 : 2;
            }
            updateView();
        }

        for (let i = 0; i < board.length; i++) {
            board[i] = Math.random() < 0.7 ? 1 : 2;
        }
        updateView();
    </script>
</body>
</html>
